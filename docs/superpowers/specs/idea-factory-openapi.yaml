openapi: 3.1.0
info:
  title: Idea Factory API
  version: 1.0.0-target
  description: |
    Target-state API contract for workspace governance and run orchestration.
servers:
  - url: /v1
tags:
  - name: Workspaces
  - name: Runs
  - name: Projections
  - name: Interventions
  - name: Trace
paths:
  /workspaces:
    post:
      tags: [Workspaces]
      summary: Create workspace
      operationId: createWorkspace
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'
      responses:
        '201':
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
  /workspaces/{workspaceId}:
    get:
      tags: [Workspaces]
      summary: Get workspace
      operationId: getWorkspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Workspace detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        '404': { $ref: '#/components/responses/NotFound' }
  /workspaces/{workspaceId}/runs:
    post:
      tags: [Runs]
      summary: Start a run
      operationId: createRun
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRunRequest'
      responses:
        '202':
          description: Run accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        '404': { $ref: '#/components/responses/NotFound' }
  /workspaces/{workspaceId}/runs/{runId}:
    get:
      tags: [Runs]
      summary: Get run summary
      operationId: getRun
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        '404': { $ref: '#/components/responses/NotFound' }
  /workspaces/{workspaceId}/projection:
    get:
      tags: [Projections]
      summary: Get latest projection
      operationId: getProjection
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - name: since_event_id
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Projection snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectionResponse'
        '404': { $ref: '#/components/responses/NotFound' }
  /workspaces/{workspaceId}/interventions:
    post:
      tags: [Interventions]
      summary: Submit intervention
      operationId: createIntervention
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInterventionRequest'
      responses:
        '202':
          description: Intervention accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterventionResponse'
        '404': { $ref: '#/components/responses/NotFound' }
  /workspaces/{workspaceId}/interventions/{interventionId}:
    get:
      tags: [Interventions]
      summary: Get intervention status
      operationId: getIntervention
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/InterventionId'
      responses:
        '200':
          description: Intervention status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterventionResponse'
        '404': { $ref: '#/components/responses/NotFound' }
  /workspaces/{workspaceId}/interventions/{interventionId}/events:
    get:
      tags: [Interventions]
      summary: List intervention lifecycle events
      operationId: listInterventionEvents
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/InterventionId'
        - name: cursor
          in: query
          schema: { type: string }
          description: Cursor from previous page in format `RFC3339|event_id`.
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/InterventionStatus'
      responses:
        '200':
          description: Intervention lifecycle events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterventionEventsResponse'
        '404': { $ref: '#/components/responses/NotFound' }
  /workspaces/{workspaceId}/trace/summary:
    get:
      tags: [Trace]
      summary: Get trace summary
      operationId: getTraceSummary
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - name: run_id
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Trace summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceSummaryResponse'
        '404': { $ref: '#/components/responses/NotFound' }
  /workspaces/{workspaceId}/trace/events:
    get:
      tags: [Trace]
      summary: List trace events
      operationId: listTraceEvents
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - name: run_id
          in: query
          schema: { type: string }
        - name: cursor
          in: query
          schema: { type: string }
          description: Cursor from previous page in format `RFC3339|event_id`.
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: category
          in: query
          schema:
            type: string
            enum: [plan, task, tool, projection, intervention, balance]
        - name: level
          in: query
          schema:
            type: string
            enum: [info, warn, error]
      responses:
        '200':
          description: Trace events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceEventsResponse'
        '404': { $ref: '#/components/responses/NotFound' }
components:
  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema: { type: string }
    RunId:
      name: runId
      in: path
      required: true
      schema: { type: string }
    InterventionId:
      name: interventionId
      in: path
      required: true
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, minLength: 8, maxLength: 128 }
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    WorkspaceStatus:
      type: string
      enum: [draft, active, paused, archived]
    RunStatus:
      type: string
      enum: [queued, planning, dispatching, integrating, projected, completed, failed, cancelled]
    PlanStatus:
      type: string
      enum: [draft, active, superseded, completed, failed]
    PlanStepStatus:
      type: string
      enum: [todo, doing, done, failed, skipped, invalidated]
    TaskStatus:
      type: string
      enum: [queued, running, succeeded, failed, timeout]
    InterventionStatus:
      type: string
      enum: [received, absorbed, replanned, reflected, rejected]
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum: [invalid_argument, not_found, conflict, too_many_requests, internal]
            message:
              type: string
            details:
              type: array
              items:
                type: string
    CreateWorkspaceRequest:
      type: object
      required: [topic, goal]
      properties:
        topic: { type: string, minLength: 1 }
        goal: { type: string, minLength: 1 }
        constraints:
          type: array
          items: { type: string }
        budget:
          type: object
          properties:
            max_runs: { type: integer, minimum: 1 }
            timebox_minutes: { type: integer, minimum: 1 }
    WorkspaceResponse:
      type: object
      required: [workspace]
      properties:
        workspace:
          type: object
          required: [id, topic, goal, status, created_at, updated_at]
          properties:
            id: { type: string }
            topic: { type: string }
            goal: { type: string }
            constraints:
              type: array
              items: { type: string }
            status:
              $ref: '#/components/schemas/WorkspaceStatus'
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }
    CreateRunRequest:
      type: object
      properties:
        trigger:
          type: string
          enum: [manual, scheduled, intervention]
        notes:
          type: string
    RunResponse:
      type: object
      required: [run]
      properties:
        run:
          type: object
          required: [id, workspace_id, status, trigger_type, started_at]
          properties:
            id: { type: string }
            workspace_id: { type: string }
            trigger_type:
              type: string
              enum: [manual, scheduled, intervention, bootstrap]
            status:
              $ref: '#/components/schemas/RunStatus'
            started_at: { type: string, format: date-time }
            finished_at: { type: string, format: date-time, nullable: true }
            current_plan:
              type: object
              nullable: true
              properties:
                id: { type: string }
                version: { type: integer, minimum: 1 }
                status: { $ref: '#/components/schemas/PlanStatus' }
                steps:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string }
                      order: { type: integer, minimum: 1 }
                      kind: { type: string }
                      assigned_agent: { type: string, enum: [research, graph, artifact, general] }
                      status: { $ref: '#/components/schemas/PlanStepStatus' }
    CreateInterventionRequest:
      type: object
      required: [intent]
      properties:
        intent: { type: string, minLength: 1 }
        target_branch_id: { type: string }
        priority:
          type: string
          enum: [low, medium, high]
          default: medium
    InterventionResponse:
      type: object
      required: [intervention]
      properties:
        intervention:
          type: object
          required: [id, workspace_id, status, intent, created_at]
          properties:
            id: { type: string }
            workspace_id: { type: string }
            intent: { type: string }
            status: { $ref: '#/components/schemas/InterventionStatus' }
            absorbed_by_run_id: { type: string, nullable: true }
            replanned_plan_id: { type: string, nullable: true }
            reflected_event_id: { type: string, nullable: true }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }
    InterventionEvent:
      type: object
      required: [id, intervention_id, workspace_id, status, created_at]
      properties:
        id: { type: string }
        intervention_id: { type: string }
        workspace_id: { type: string }
        status: { $ref: '#/components/schemas/InterventionStatus' }
        created_at: { type: string, format: date-time }
    InterventionEventsResponse:
      type: object
      required: [workspace_id, intervention_id, events, has_more]
      properties:
        workspace_id: { type: string }
        intervention_id: { type: string }
        events:
          type: array
          items:
            $ref: '#/components/schemas/InterventionEvent'
        next_cursor: { type: string }
        has_more: { type: boolean }
    ProjectionResponse:
      type: object
      required: [projection]
      properties:
        projection:
          type: object
          required: [workspace_id, event_id, generated_at, map, recent_changes]
          properties:
            workspace_id: { type: string }
            event_id: { type: string }
            generated_at: { type: string, format: date-time }
            map:
              type: object
              properties:
                nodes:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string }
                      title: { type: string }
                      heat: { type: number }
                      folded: { type: boolean }
                edges:
                  type: array
                  items:
                    type: object
                    properties:
                      from: { type: string }
                      to: { type: string }
                      kind: { type: string }
            recent_changes:
              type: array
              items:
                type: object
                properties:
                  type: { type: string }
                  summary: { type: string }
            run_summary:
              type: object
              properties:
                run_id: { type: string }
                status: { $ref: '#/components/schemas/RunStatus' }
                focus: { type: string }
            intervention_effects:
              type: array
              items:
                type: object
                properties:
                  intervention_id: { type: string }
                  effect_summary: { type: string }
    TraceSummaryResponse:
      type: object
      required: [workspace_id, items]
      properties:
        workspace_id: { type: string }
        run_id: { type: string, nullable: true }
        items:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              timestamp: { type: string, format: date-time }
              level: { type: string, enum: [info, warn, error] }
              category:
                type: string
                enum: [plan, task, tool, projection, intervention, balance]
              message: { type: string }
              related_ids:
                type: array
                items: { type: string }
    TraceEventsResponse:
      type: object
      required: [workspace_id, items, has_more]
      properties:
        workspace_id: { type: string }
        run_id: { type: string, nullable: true }
        items:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              timestamp: { type: string, format: date-time }
              level: { type: string, enum: [info, warn, error] }
              category:
                type: string
                enum: [plan, task, tool, projection, intervention, balance]
              message: { type: string }
              related_ids:
                type: array
                items: { type: string }
        next_cursor: { type: string }
        has_more: { type: boolean }
